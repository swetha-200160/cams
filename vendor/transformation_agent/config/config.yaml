# ══════════════════════════════════════════════════════════════
# Transformation Agent — Central Configuration
# ══════════════════════════════════════════════════════════════
# All runtime constants live here. No hardcoded values in source files.
# Edit this file to adjust behaviour without touching Python code.

# ── LLM ───────────────────────────────────────────────────────
llm:
  model: "llama-3.1-8b-instant"
  max_prompt_chars: 4000

# ── File Paths ────────────────────────────────────────────────
paths:
  input_folder: "input_docs"
  output_folder: "output"
  output_file: "output/transformation_output.json"

# ── File Handling ─────────────────────────────────────────────
file_handling:
  supported_extensions:
    - ".pdf"
    - ".xlsx"
    - ".xls"
    - ".csv"
    - ".docx"
    - ".doc"
    - ".txt"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".bmp"
    - ".tiff"
  min_table_rows: 2          # Tables with fewer rows are discarded
  table_type_min_hits: 2     # Min anchor keyword hits to assign a table type

# ── Pipeline Tabs ─────────────────────────────────────────────
pipeline:
  tabs:
    - "overview"
    - "balance_sheet"
    - "income_statement"
    - "cash_flow"

# ── Character / Token Limits ──────────────────────────────────
limits:
  max_prompt_chars: 4000
  cleaning_max_table_chars: 6000    # Budget for serialized table data in cleaning prompt
  cleaning_max_text_chars: 4000     # Budget for text sections in cleaning prompt
  cleaning_header_chars: 400        # Chars reserved for document header (company name)
  cleaning_cf_chars: 2000           # Chars reserved for cash flow section
  structuring_max_cleaned_chars: 4000   # Budget for cleaned_data JSON in structuring prompt
  structuring_max_table_chars: 10000    # Budget for raw table rows in structuring prompt
  max_sane_value: 1.0e+12           # Max plausible financial value (1 trillion); above = corrupt

# ── Financial Field Names per Tab ────────────────────────────
# These define which schema fields belong to each financial tab.
financial_fields:
  balance_sheet:
    - share_capital
    - reserves_surplus
    - long_term_borrowing
    - short_term_borrowing
    - trade_payables
    - fixed_assets
  income_statement:
    - revenue_from_operations
    - other_income
    - cost_of_material
    - employee_benefit_expense
    - finance_cost
    - depreciation
  cash_flow:
    - operating_activities
    - investing_activities
    - financing_activities
    - net_change_in_cash
  # Internal merge metadata — excluded from financial data checks
  meta_fields:
    - year
    - source_document
    - source_documents
    - doc_type
    - doc_priority
  # Ratio analysis data fields (for the Ratio Analysis Agent)
  ratio_analysis:
    - total_revenue_from_operations
    - total_revenue
    - net_operating_income
    - operating_expense
    - other_operating_expense
    - employee_benefit_expense
    - ebitda
    - profit_before_tax
    - current_tax
    - deferred_tax
    - net_income
    - depreciation_amortization
    - finance_cost
    - interest_payment
    - principal_repayment
    - total_debt_service
    - fixed_payment_obligation
    - opening_debt
    - closing_debt
    - current_assets
    - current_liabilities
    - shareholder_equity
    - share_capital
    - reserves_surplus
  # Schema section names (used for set-based lookups)
  all_financial_sections:
    - balance_sheets
    - income_statements
    - cash_flows
    - ratio_analysis_data

