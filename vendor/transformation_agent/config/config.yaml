cleaning_field_map:
  revenue_from_operations:  "net_sales_figures"
  other_income:             "other_income_figures"
  cost_of_material:         "material_cost_figures"
  employee_benefit_expense: "employee_cost_figures"
  finance_cost:             "finance_cost_figures"
  depreciation:             "depreciation_figures"
  share_capital:            "share_capital_figures"
  reserves_surplus:         "reserves_figures"
  long_term_borrowing:      "lt_borrowing_figures"
  short_term_borrowing:     "st_borrowing_figures"
  trade_payables:           "trade_payables_figures"
  fixed_assets:             "fixed_assets_figures"
  operating_activities:     "operating_cf_figures"
  investing_activities:     "investing_cf_figures"
  financing_activities:     "financing_cf_figures"
  net_change_in_cash:       "net_cash_figures"

# ── Cleaning Field Priority (ordered) ────────────────────────
# When multiple Node 4 fields map to the same target, earlier = higher priority.
cleaning_field_priority:
  - revenue_from_operations
  - other_income
  - cost_of_material
  - employee_benefit_expense
  - finance_cost
