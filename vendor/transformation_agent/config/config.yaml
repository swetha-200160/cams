# ── Document Types ────────────────────────────────────────────
document_types:

  # All recognized document type labels
  valid_labels:
    - "Financial Statement"
    - "Balance Sheet"
    - "Income Statement"
    - "Cash Flow Statement"
    - "Bank Statement"
    - "GST Return"
    - "Income Tax Return"
    - "ROC Filing"
    - "Annual Report"
    - "Unknown"
    - "Board Resolution"
    - "Certificate of Incorporation"
    - "Loan Document"
    - "Company Profile"
    - "Credit Report"

  # File extensions that strongly imply a doc type without reading content
  extension_hints:
    ".xlsx": "Financial Statement"
    ".xls": "Financial Statement"

  # Doc types that must NEVER contribute financial rows to any tab.
  non_financial:
    - "Loan Document"
    - "Company Profile"
    - "Board Resolution"
    - "Certificate of Incorporation"
    - "Credit Report"
    - "Bank Statement"
    - "GST Return"
    - "ROC Filing"

  # Priority for conflict resolution when multiple docs have same-year data.
  # Lower number = higher authority.
  priorities:
    "Balance Sheet":              1
    "Income Statement":           1
    "Cash Flow Statement":        1
    "Financial Statement":        2
    "Annual Report":              3
    "Bank Statement":             4
    "GST Return":                 4
    "Income Tax Return":          4
    "ROC Filing":                 5
    "Loan Document":              6
    "Company Profile":            6
    "Board Resolution":           6
    "Certificate of Incorporation": 6
    "Credit Report":              6
    "Unknown":                    7

  # Weights for company name consensus voting (higher = more trusted)
  reliable_company_name_types:
    "Balance Sheet":              3
    "Income Statement":           3
    "Cash Flow Statement":        3
    "Financial Statement":        3
    "Income Tax Return":          3
    "GST Return":                 2
    "ROC Filing":                 2
    "Certificate of Incorporation": 2
    "Bank Statement":             2
    "Credit Report":              2
    "Loan Document":              1
    "Annual Report":              1
    "Company Profile":            1
    "Board Resolution":           1
    "Unknown":                    1

  # Which schema sections each doc type is allowed to fill.
  # Empty list = identifiers only, no financial rows.
  # ratio_analysis_data is allowed for all financial statement types because
  # its fields span Balance Sheet (current assets/liabilities), Income
  # Statement (PBT, net income, EBITDA) and Cash Flow (principal repayment).
  allowed_sections:
    "Balance Sheet":              ["balance_sheets", "ratio_analysis_data"]
    "Income Statement":           ["income_statements", "ratio_analysis_data"]
    "Cash Flow Statement":        ["cash_flows", "ratio_analysis_data"]
    "Financial Statement":        ["balance_sheets", "income_statements", "cash_flows", "ratio_analysis_data"]
    "Annual Report":              ["balance_sheets", "income_statements", "cash_flows", "ratio_analysis_data"]
    "Bank Statement":             []
    "GST Return":                 []
    "Income Tax Return":          []
    "ROC Filing":                 []
    "Loan Document":              []
    "Company Profile":            []
    "Board Resolution":           []
    "Certificate of Incorporation": []
    "Credit Report":              []
    "Unknown":                    ["balance_sheets", "income_statements", "cash_flows", "ratio_analysis_data"]

