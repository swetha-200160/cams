# ── Company Name Filtering ────────────────────────────────────
company_name:
  # Placeholder / LLM-artefact values treated as "no company name".
  # Used in both consensus voting and mismatch filtering.
  invalid_names:
    - "company"
    - "company name"
    - "null"
    - "none"
    - ""
    - "n/a"
    - "borrower"
    - "the company"
    - "name of company"
    # LLM prompt artefacts — model echoed the type hint literally
    - "string or null"
    - "string"
    - "string or none"
    - "integer or null"
    - "number or null"
    # Generic / template placeholder names
    - "abc corporation"
    - "abc corp"
    - "abc company"
    - "abc ltd"
    - "abc limited"
    - "example company"
    - "sample company"
    - "test company"
    - "your company"
    - "your company name"
    - "company name here"
    - "enter company name"
    - "xyz corporation"
    - "xyz company"
    - "xyz ltd"
    - "na"
    - "not available"
    - "not applicable"
    - "unknown"

  # Common words in company names that are NOT distinctive for matching.
  stop_words:
    - "ltd"
    - "limited"
    - "pvt"
    - "private"
    - "inc"
    - "incorporated"
    - "corp"
    - "corporation"
    - "co"
    - "company"
    - "the"
    - "and"
    - "of"
    - "for"
    - "a"
    - "an"
    - "technologies"
    - "technology"
    - "services"
    - "solutions"
    - "group"
    - "india"
    - "global"
    - "international"
    - "enterprises"
    - "holdings"
