    - "Certificate of Incorporation"
    - "Board Resolution"

# ── Category Rules ────────────────────────────────────────────
# Used by document_intake.py (Node 1) to pre-classify documents by filename.
# Structure: label = broad CAMS category; subtypes = ordered list of
# {keywords, doc_type} — first match wins (most specific first).
# Keywords matched against normalized filename (lowercase, no extension,
# special chars → spaces).
category_rules:

  - label: "Financial Statement"
    subtypes:
      - keywords: ["balance sheet", "balance_sheet", "balancesheet",
                   "bs 20", "audited balance", "b sheet", "bsheet"]
        doc_type: "Balance Sheet"
      - keywords: ["cash flow", "cashflow", "cash_flow",
                   "statement of cash", "scfs", "cfs statement"]
        doc_type: "Cash Flow Statement"
      - keywords: ["profit loss", "profit and loss", "p and l", "p&l",
                   "pnl", "income statement", "income_statement",
                   "statement of income", "profit & loss",
                   "trading account", "trading p l"]
        doc_type: "Income Statement"
      - keywords: ["financial statement", "financial_statement",
                   "financials", "audited accounts", "annual accounts",
                   "standalone financial", "consolidated financial",
                   "audited fs", "annual report", "directors report"]
        doc_type: "Financial Statement"

  - label: "Bank Statement"
    subtypes:
      - keywords: ["credit card statement", "cc statement", "cc_statement",
                   "card statement", "credit card"]
        doc_type: "Credit Card Statement"
      - keywords: ["od statement", "overdraft statement",
                   "cash credit statement", "cc account statement",
                   "od account", "overdraft account"]
        doc_type: "Overdraft / CC Account Statement"
      - keywords: ["hdfc bank statement", "sbi bank statement",
                   "icici bank statement", "axis bank statement",
                   "kotak bank statement", "pnb bank statement",
                   "yes bank statement", "indusind statement",
                   "canara statement", "union bank statement",
                   "bank of baroda statement", "bob statement",
                   "idfc statement", "federal bank statement",
                   "rbl statement", "bandhan bank statement"]
        doc_type: "Bank Statement"
      - keywords: ["bank statement", "bank_statement", "bankstatement",
                   "account statement", "account_statement",
                   "savings account", "current account",
                   "bank passbook", "passbook", "bank_stmt",
                   "statement of account", "bank acct"]
        doc_type: "Bank Statement"

  - label: "GST Return"
    subtypes:
      - keywords: ["gstr 9c", "gstr9c", "gstr-9c"]
        doc_type: "GSTR-9C (GST Audit)"
      - keywords: ["gstr 9", "gstr9", "gstr-9",
                   "gst annual return", "annual gst return"]
        doc_type: "GSTR-9 (Annual Return)"
      - keywords: ["gstr 1", "gstr1", "gstr-1", "outward supply"]
        doc_type: "GSTR-1 (Outward Supplies)"
      - keywords: ["gstr 3b", "gstr3b", "gstr-3b",
                   "monthly return", "gst monthly"]
        doc_type: "GSTR-3B (Monthly Return)"
